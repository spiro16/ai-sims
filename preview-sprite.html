<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sims OS — Sprite Preview</title>
  <style>
    *{box-sizing:border-box} body{margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:#8fc9ee;color:#17233a} canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;z-index:5;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.66);box-shadow:0 18px 48px rgba(44,67,101,.2)}.top{left:18px;right:18px;top:14px;height:68px;border-radius:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}.brand{display:flex;gap:12px;align-items:center}.gem{width:28px;height:28px;background:#49ce70;transform:rotate(45deg);box-shadow:0 10px 24px rgba(73,206,112,.42);border-radius:4px}.brand small{display:block;color:#6b7488;font-weight:700}.badge{color:#128a42;font-weight:900}.left,.right{top:100px;bottom:92px;width:260px;border-radius:26px;padding:16px;overflow:auto}.left{left:18px}.right{right:18px;width:320px}.left h2,.right h2{margin:0 0 12px}.row{width:100%;border:1px solid transparent;background:#f4f7fc;border-radius:16px;padding:10px;margin:0 0 8px;display:flex;align-items:center;gap:10px;text-align:left;cursor:pointer}.row:hover,.row.active{background:#fff;border-color:#72a8ef}.avatar{font-size:27px}.row small{display:block;color:#6b7488}.portrait{font-size:44px;width:70px;height:70px;border-radius:24px;background:#eef4fb;display:grid;place-items:center}.profile{display:flex;gap:13px;align-items:center}.pill{display:inline-block;background:#eaf0fb;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.card{background:#f1f5fb;border-radius:16px;padding:12px;margin:8px 0 14px}.meters label{display:block;color:#6b7488;font-size:12px;margin:9px 0}.meters progress{width:100%;height:11px;accent-color:#63c876}.bottom{left:50%;bottom:16px;transform:translateX(-50%);height:64px;border-radius:24px;width:min(760px,calc(100vw - 40px));display:flex;align-items:center;justify-content:space-between;padding:0 14px}.controls{display:flex;gap:8px}.controls button,.wide{border:0;border-radius:14px;background:#edf2fa;color:#17233a;font-weight:900;cursor:pointer;padding:10px 13px}.controls button.active{background:#5a8df0;color:white}.wide{width:100%;background:#263b64;color:white}.hint{position:fixed;z-index:4;left:50%;bottom:94px;transform:translateX(-50%);background:rgba(31,47,75,.82);color:white;border-radius:999px;padding:8px 13px;font-size:12px}@media(max-width:950px){.left,.right{display:none}.top{left:10px;right:10px}.brand small{display:none}.hint{display:none}}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header class="hud top"><div class="brand"><div class="gem"></div><div><strong>AI Sims OS</strong><small><span class="badge">SPRITE PASS v1</span> · smooth character movement</small></div></div><div><strong id="time">Dan 1 · 09:00</strong> · <span id="speedLabel">PLAY</span></div></header>
  <aside class="hud left"><h2>AI tim</h2><div id="list"></div><button class="wide" id="newTask">＋ Novi zadatak</button></aside>
  <aside class="hud right"><div id="inspector"></div></aside>
  <footer class="hud bottom"><div class="controls"><button id="pause">⏸</button><button id="play" class="active">▶</button><button id="fast">▶▶</button></div><div><b id="agentCount">6</b> agenata · glatki sprite loop</div><button id="reset" class="wide" style="width:auto;background:#f8e5e5;color:#9d3636">Reset</button></footer>
  <div class="hint">Novi URL bez cachea · klikni lika · likovi sada imaju target, easing, smjer i walk cycle</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight,dpr=devicePixelRatio||1;function resize(){W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
const rooms=[
 {id:'ceo',name:'CEO Office',floor:1,col:0,color:'#f3c1d1',items:['🪑','💻','📌']},{id:'research',name:'Research',floor:1,col:1,color:'#b9e3d0',items:['🔬','📚','🧠']},{id:'meeting',name:'Meeting',floor:1,col:2,color:'#e9dfbd',items:['📋','🪑','🧩']},
 {id:'lounge',name:'Lounge',floor:0,col:0,color:'#d7e7bc',items:['🛋️','☕','🌿']},{id:'dev',name:'Development',floor:0,col:1,color:'#b8d8f5',items:['💻','🖥️','☕']},{id:'studio',name:'Creative Studio',floor:0,col:2,color:'#f6d69b',items:['🎨','📸','🪴']},{id:'qa',name:'QA Lab',floor:0,col:3,color:'#d2c5ee',items:['🧪','🖥️','✅']}
];
const defaults=[
 {id:'alpha',avatar:'🧠',name:'Alpha',role:'CEO agent',model:'Qwen 3',room:'ceo',u:.45,d:.55,shirt:'#e86c91',hair:'#53372f',skin:'#f0bd8f',pants:'#273754',task:'Planira AI firmu',energy:88,focus:82,mood:86,say:'Provjeravam sprint.'},
 {id:'nova',avatar:'👩‍💻',name:'Nova',role:'Developer',model:'DeepSeek Coder',room:'dev',u:.52,d:.58,shirt:'#547de8',hair:'#352a28',skin:'#f2c29a',pants:'#25334d',task:'Gradi renderer',energy:73,focus:91,mood:75,say:'Buildam engine.'},
 {id:'atlas',avatar:'🔎',name:'Atlas',role:'Researcher',model:'Llama 3.3',room:'research',u:.44,d:.55,shirt:'#42a983',hair:'#68452f',skin:'#d6a078',pants:'#243749',task:'Istražuje workflow',energy:81,focus:87,mood:79,say:'Tražim bolji flow.'},
 {id:'mira',avatar:'✍️',name:'Mira',role:'Creative agent',model:'Gemma 3',room:'studio',u:.52,d:.60,shirt:'#e5a33d',hair:'#875339',skin:'#e6b184',pants:'#34405d',task:'Radi vizuale',energy:77,focus:74,mood:92,say:'Dodajem toplinu.'},
 {id:'pixel',avatar:'🧪',name:'Pixel',role:'QA agent',model:'Mistral',room:'qa',u:.45,d:.56,shirt:'#8a68d8',hair:'#342c42',skin:'#efc09a',pants:'#26334d',task:'Testira interakcije',energy:69,focus:89,mood:71,say:'Našao sam bug.'},
 {id:'bolt',avatar:'⚙️',name:'Bolt',role:'Ops agent',model:'Qwen 3',room:'lounge',u:.47,d:.57,shirt:'#67a64c',hair:'#493f31',skin:'#d9a27d',pants:'#26334d',task:'Prati deploy',energy:64,focus:68,mood:84,say:'Deploy je živ.'}
];
let state=JSON.parse(localStorage.getItem('ai-sims-sprite-preview')||'null')||{agents:defaults,selected:'alpha',minute:9*60,day:1,speed:1,cost:0};
const layout={roomW:205,roomH:126,depth:58,floorGap:44,x0:-420,y0:-210};
const roomById=id=>rooms.find(r=>r.id===id), agentById=id=>state.agents.find(a=>a.id===id);const clamp=(n,a=0,b=100)=>Math.max(a,Math.min(b,n));function save(){localStorage.setItem('ai-sims-sprite-preview',JSON.stringify(state))}
function rr(room){const x=layout.x0+room.col*layout.roomW,y=layout.y0+(1-room.floor)*(layout.roomH+layout.depth+layout.floorGap);return{x,y,w:layout.roomW,h:layout.roomH,d:layout.depth}}
function pos(a){const r=rr(roomById(a.room));return{x:r.x+r.w*a.u+r.d*.45*a.d,y:r.y+r.h+r.d*a.d}}
const sprites=new Map();function initSprite(a){const p=pos(a);return{x:p.x,y:p.y,tx:p.x,ty:p.y,step:Math.random()*10,dir:1,talkUntil:0,nextDecision:800+Math.random()*1800,blink:0,idle:0}}
state.agents.forEach(a=>{if(!sprites.has(a.id))sprites.set(a.id,initSprite(a))});
let cam={x:W/2-20,y:H/2+60,zoom:1},last=performance.now(),accum=0;
function worldToScreen(p){return{x:cam.x+p.x*cam.zoom,y:cam.y+p.y*cam.zoom}}
function screenToWorld(x,y){return{x:(x-cam.x)/cam.zoom,y:(y-cam.y)/cam.zoom}}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function poly(points,fill,stroke='#6f6259',alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);points.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();ctx.restore()}
function drawHouse(){ctx.save();ctx.translate(cam.x,cam.y);ctx.scale(cam.zoom,cam.zoom);ctx.fillStyle='#8fc9ee';ctx.fillRect(-4000,-4000,8000,8000);ctx.fillStyle='rgba(255,242,166,.8)';ctx.beginPath();ctx.arc(560,-350,64,0,Math.PI*2);ctx.fill();ctx.fillStyle='#78bd70';ctx.fillRect(-4000,340,8000,4000);
 const shellX=layout.x0-28, shellY=layout.y0-56, shellW=layout.roomW*4+56, shellH=(layout.roomH+layout.depth)*2+layout.floorGap+72;ctx.fillStyle='#9b755f';roundRect(shellX-10,shellY-10,shellW+20,18,8);ctx.fill();ctx.fillStyle='#f7efe5';roundRect(shellX,shellY,shellW,shellH,10);ctx.fill();ctx.fillStyle='#d9c7b4';ctx.fillRect(shellX,shellY+shellH-16,shellW,24);ctx.fillStyle='rgba(0,0,0,.09)';roundRect(shellX+18,shellY+shellH-5,shellW-36,30,18);ctx.fill();
 rooms.filter(r=>r.floor===1).forEach(drawRoom);drawSlab(layout.y0+layout.roomH+layout.depth+18);rooms.filter(r=>r.floor===0).forEach(drawRoom);drawStairs();ctx.restore()}
function drawSlab(y){ctx.fillStyle='#9d8876';ctx.fillRect(layout.x0-14,y,layout.roomW*4+28,15);ctx.fillStyle='#75685e';ctx.fillRect(layout.x0-14,y+14,layout.roomW*4+28,10)}
function drawRoom(room){const r=rr(room),d=r.d;ctx.fillStyle='#fffbf5';ctx.fillRect(r.x,r.y,r.w,r.h);ctx.globalAlpha=.55;ctx.fillStyle=room.color;ctx.fillRect(r.x+6,r.y+8,r.w-12,r.h-14);ctx.globalAlpha=1;poly([[r.x,r.y],[r.x+d*.45,r.y+d*.42],[r.x+d*.45,r.y+r.h+d*.42],[r.x,r.y+r.h]],'#e6d9ca');poly([[r.x+r.w,r.y],[r.x+r.w+d*.45,r.y+d*.42],[r.x+r.w+d*.45,r.y+r.h+d*.42],[r.x+r.w,r.y+r.h]],'#d8cbbd');poly([[r.x,r.y+r.h],[r.x+r.w,r.y+r.h],[r.x+r.w+d*.45,r.y+r.h+d],[r.x+d*.45,r.y+r.h+d]],room.color);
 ctx.strokeStyle='rgba(111,98,89,.38)';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x,r.y+r.h);ctx.moveTo(r.x+r.w,r.y);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.moveTo(r.x,r.y+r.h);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.stroke();ctx.fillStyle='#25344d';ctx.font='700 14px Arial';ctx.lineWidth=4;ctx.strokeStyle='white';ctx.strokeText(room.name,r.x+14,r.y+28);ctx.fillText(room.name,r.x+14,r.y+28);room.items.forEach((it,i)=>{ctx.font='29px Arial';ctx.fillText(it,r.x+r.w*(.20+.24*i),r.y+r.h+d*(.48+.08*(i%2)))})}
function drawStairs(){const bottom=rr(roomById('dev')),top=rr(roomById('research'));for(let i=0;i<11;i++){const x=bottom.x+bottom.w-26+i*10,y=bottom.y+bottom.h+bottom.d-18-i*18;poly([[x,y],[x+46,y+6],[x+30,y+18],[x-14,y+10]],i%2?'#c9baa8':'#ddd0bf','#a89786')}ctx.strokeStyle='rgba(111,98,89,.65)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(bottom.x+bottom.w-32,bottom.y+bottom.h+bottom.d-48);ctx.lineTo(top.x+18,top.y+top.h+top.d+20);ctx.stroke()}
function drawPlumbob(x,y){ctx.save();ctx.fillStyle='#4ed16f';ctx.shadowColor='rgba(78,209,111,.5)';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(x,y-102);ctx.lineTo(x+12,y-78);ctx.lineTo(x,y-54);ctx.lineTo(x-12,y-78);ctx.closePath();ctx.fill();ctx.restore()}
function drawBubble(a,s){if(performance.now()>s.talkUntil)return;ctx.save();ctx.font='11px Arial';const x=s.x+24,y=s.y-122,w=132,h=36;ctx.fillStyle='rgba(255,255,255,.96)';roundRect(x,y,w,h,12);ctx.fill();ctx.fillStyle='#17233a';wrapText(a.say,x+8,y+15,116,13);ctx.restore()}
function wrapText(text,x,y,maxWidth,lineHeight){const words=text.split(' ');let line='';for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxWidth&&line){ctx.fillText(line,x,y);line=word+' ';y+=lineHeight}else line=test}ctx.fillText(line,x,y)}
function drawAgent(a,s){const walk=Math.hypot(s.tx-s.x,s.ty-s.y)>2;const bob=walk?Math.sin(s.step)*2:Math.sin(s.step*.3)*.6;const leg=Math.sin(s.step)*8,arm=-Math.sin(s.step)*6;ctx.save();ctx.translate(s.x,s.y+bob);ctx.scale(s.dir,1);ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(0,9,24,8,0,0,Math.PI*2);ctx.fill();ctx.lineCap='round';ctx.lineWidth=6;ctx.strokeStyle=a.pants;ctx.beginPath();ctx.moveTo(-6,-8);ctx.lineTo(-10+leg*.15,13);ctx.moveTo(6,-8);ctx.lineTo(10-leg*.15,13);ctx.stroke();ctx.strokeStyle=a.skin;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-12,-34);ctx.lineTo(-19, -18+arm*.18);ctx.moveTo(12,-34);ctx.lineTo(19, -18-arm*.18);ctx.stroke();ctx.fillStyle=a.shirt;roundRect(-15,-46,30,40,10);ctx.fill();ctx.fillStyle='rgba(255,255,255,.16)';roundRect(-9,-41,9,31,6);ctx.fill();ctx.fillStyle=a.skin;ctx.beginPath();ctx.ellipse(0,-63,15,17,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=a.hair;ctx.beginPath();ctx.ellipse(0,-76,16,11,0,0,Math.PI*2);ctx.fill();ctx.fillRect(-15,-73,30,11);ctx.fillStyle='#1c2435';ctx.beginPath();ctx.arc(-5,-63,1.7,0,Math.PI*2);ctx.arc(5,-63,1.7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#9a6556';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-58,5,0.15*Math.PI,0.85*Math.PI);ctx.stroke();ctx.restore();if(state.selected===a.id)drawPlumbob(s.x,s.y);drawBubble(a,s);ctx.save();ctx.font='700 13px Arial';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='#1f2a3e';ctx.fillStyle='white';ctx.strokeText(a.name,s.x,s.y+25);ctx.fillText(a.name,s.x,s.y+25);ctx.restore()}
function updateSprites(dt){state.agents.forEach(a=>{const s=sprites.get(a.id)||initSprite(a);sprites.set(a.id,s);const target=pos(a);s.tx=target.x;s.ty=target.y;const dx=s.tx-s.x,dy=s.ty-s.y,dist=Math.hypot(dx,dy);if(dist>0.5){const speed=0.13*dt*(state.speed||1);s.x+=dx*Math.min(1,speed/Math.max(1,dist));s.y+=dy*Math.min(1,speed/Math.max(1,dist));s.dir=dx>=0?1:-1;s.step+=dt*.018}else{s.step+=dt*.004}s.nextDecision-=dt*(state.speed||1);if(state.speed&&s.nextDecision<=0){chooseNext(a,s);s.nextDecision=1800+Math.random()*2600;s.talkUntil=performance.now()+1600+Math.random()*1300}})}
function chooseNext(a,s){const roll=Math.random();if(roll>.82){const choices=rooms.filter(r=>r.id!==a.room);const next=choices[Math.floor(Math.random()*choices.length)];a.room=next.id;a.u=.48;a.d=.30;a.say=`Idem u ${next.name}.`}else{a.u=clamp(a.u+(Math.random()*.42-.21),.18,.82);a.d=clamp(a.d+(Math.random()*.35-.17),.35,.88);a.say=['Radim na zadatku.','Trebam review.','Imam novu ideju.','Provjeravam status.'][Math.floor(Math.random()*4)]}a.energy=clamp(a.energy-Math.random()*1.1*(state.speed||1));a.focus=clamp(a.focus+Math.random()*4-2);a.mood=clamp(a.mood+Math.random()*3-1.5);save();renderUI()}
function loop(now){const dt=Math.min(33,now-last);last=now;if(state.speed){state.minute+=dt*.0026*state.speed;if(state.minute>=1440){state.minute=7*60;state.day++}state.cost+=dt*.0000015*state.speed}updateSprites(dt);ctx.clearRect(0,0,W,H);drawHouse();ctx.save();ctx.translate(cam.x,cam.y);ctx.scale(cam.zoom,cam.zoom);[...state.agents].sort((a,b)=>{const pa=sprites.get(a.id),pb=sprites.get(b.id);return (pa?.y||0)-(pb?.y||0)}).forEach(a=>drawAgent(a,sprites.get(a.id)));ctx.restore();accum+=dt;if(accum>250){renderUI(false);accum=0}requestAnimationFrame(loop)}
function renderUI(full=true){if(full){const list=document.getElementById('list');list.innerHTML='';state.agents.forEach(a=>{const b=document.createElement('button');b.className='row '+(state.selected===a.id?'active':'');b.innerHTML=`<span class="avatar">${a.avatar}</span><span><b>${a.name}</b><small>${a.role}</small></span>`;b.onclick=()=>{state.selected=a.id;save();renderUI(true)};list.appendChild(b)})}const a=agentById(state.selected),r=roomById(a.room);document.getElementById('inspector').innerHTML=`<div class="profile"><div class="portrait">${a.avatar}</div><div><h2>${a.name}</h2><p>${a.role} · ${r.name}</p><span class="pill">${a.model}</span></div></div><section><h3>Trenutni zadatak</h3><div class="card">${a.task}</div></section><section class="meters"><h3>Potrebe</h3><label>⚡ Energija <progress value="${a.energy}" max="100"></progress></label><label>🎯 Fokus <progress value="${a.focus}" max="100"></progress></label><label>😊 Mood <progress value="${a.mood}" max="100"></progress></label></section><section><h3>Sprite pass</h3><div class="card">Ova verzija koristi glatki sprite loop: target pozicije, easing, smjer gledanja, walk cycle i stabilne balončiće.</div></section>`;const h=Math.floor(state.minute/60)%24,m=Math.floor(state.minute%60);document.getElementById('time').textContent=`Dan ${state.day} · ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;document.getElementById('speedLabel').textContent=state.speed===0?'PAUZA':state.speed===1?'PLAY':'FAST';document.getElementById('pause').classList.toggle('active',state.speed===0);document.getElementById('play').classList.toggle('active',state.speed===1);document.getElementById('fast').classList.toggle('active',state.speed===3)}
document.getElementById('pause').onclick=()=>{state.speed=0;renderUI()};document.getElementById('play').onclick=()=>{state.speed=1;renderUI()};document.getElementById('fast').onclick=()=>{state.speed=3;renderUI()};document.getElementById('newTask').onclick=()=>{const t=prompt('Novi zadatak za AI kompaniju:');if(!t)return;const a=agentById(state.selected);a.task=t;a.say='Primljeno. Krećem.';const s=sprites.get(a.id);s.talkUntil=performance.now()+2600;save();renderUI()};document.getElementById('reset').onclick=()=>{if(confirm('Resetirati sprite preview?')){localStorage.removeItem('ai-sims-sprite-preview');location.reload()}};
let dragging=false,start={};canvas.addEventListener('wheel',e=>{e.preventDefault();cam.zoom=clamp(cam.zoom-e.deltaY*.001,.65,1.45)},{passive:false});canvas.addEventListener('pointerdown',e=>{dragging=true;start={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y}});addEventListener('pointermove',e=>{if(dragging){cam.x=start.cx+e.clientX-start.x;cam.y=start.cy+e.clientY-start.y}});addEventListener('pointerup',()=>dragging=false);canvas.addEventListener('click',e=>{const w=screenToWorld(e.clientX,e.clientY);let best=null,bd=999;state.agents.forEach(a=>{const s=sprites.get(a.id);const d=Math.hypot(w.x-s.x,w.y-s.y+35);if(d<35&&d<bd){best=a;bd=d}});if(best){state.selected=best.id;save();renderUI(true)}});
renderUI(true);requestAnimationFrame(loop);
</script>
</body>
</html>

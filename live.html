const sprites=new Map();function agentPos(a){const rr=roomRect(roomById(a.room));return{x:rr.x+rr.w*a.u+rr.d*.45*a.d,y:rr.y+rr.h+rr.d*a.d};}function makeSprite(a){const c=new PIXI.Container();c.eventMode='static';c.cursor='pointer';c.on('pointertap',()=>{state.selected=a.id;ui();});const shadow=new PIXI.Graphics();shadow.beginFill(0x000000,.16);shadow.drawEllipse(0,4,18,6);shadow.endFill();c.addChild(shadow);const gem=new PIXI.Graphics();gem.beginFill(0x4ed16f);gem.moveTo(0,-72);gem.lineTo(9,-55);gem.lineTo(0,-38);gem.lineTo(-9,-55);gem.closePath();gem.endFill();c.addChild(gem);const wrap=new PIXI.Container();c.addChild(wrap);const parts={c,gem,wrap,shadow,legL:new PIXI.Graphics(),legR:new PIXI.Graphics(),armL:new PIXI.Graphics(),armR:new PIXI.Graphics(),torso:new PIXI.Graphics(),head:new PIXI.Graphics(),hair:new PIXI.Graphics(),face:new PIXI.Graphics(),phase:Math.random()*6};wrap.addChild(parts.armL,parts.armR,parts.legL,parts.legR,parts.torso,parts.head,parts.hair,parts.face);const bubble=new PIXI.Container();const bg=new PIXI.Graphics();bg.beginFill(0xffffff,.96);bg.drawRoundedRect(0,0,138,38,12);bg.endFill();bubble.addChild(bg);const tx=new PIXI.Text(a.say,{fontSize:11,fill:0x17233a,wordWrap:true,wordWrapWidth:120});tx.x=8;tx.y=7;bubble.addChild(tx);bubble.x=18;bubble.y=-96;c.addChild(bubble);parts.bubble=bubble;parts.tx=tx;const nm=label(a.name,0,14,12,0xffffff);nm.anchor.set(.5,0);nm.style.stroke=0x1f2a3e;nm.style.strokeThickness=4;c.addChild(nm);sprites.set(a.id,parts);agentLayer.addChild(c);return parts;}function limb(g,x1,y1,x2,y2,col){g.clear();g.lineStyle(5,col,1);g.moveTo(x1,y1);g.lineTo(x2,y2);}function sync(a,dt){let s=sprites.get(a.id)||makeSprite(a),p=agentPos(a);s.c.x=lerp(s.c.x||p.x,p.x,Math.min(1,dt*8));s.c.y=lerp(s.c.y||p.y,p.y,Math.min(1,dt*8));const moving=Math.hypot((a.px??p.x)-s.c.x,(a.py??p.y)-s.c.y)>.15;a.px=s.c.x;a.py=s.c.y;s.phase+=moving?dt*10:dt*2;const sway=moving?Math.sin(s.phase)*5:Math.sin(s.phase)*1.2;s.wrap.y=moving?Math.abs(Math.sin(s.phase*2))*1.5:0;s.gem.visible=state.selected===a.id;s.bubble.visible=!!a.say&&a.bubble>0;s.tx.text=a.say;const skin=0xf0bd8f,pant=0x25334d;limb(s.legL,-6,-6,-6+sway,13,pant);limb(s.legR,6,-6,6-sway,13,pant);limb(s.armL,-11,-32,-13-sway*.6,-10,skin);limb(s.armR,11,-32,13+sway*.6,-10,skin);s.torso.clear();s.torso.beginFill(a.shirt);s.torso.drawRoundedRect(-12,-42,24,30,8);s.torso.endFill();s.head.clear();s.head.beginFill(skin);s.head.drawCircle(0,-55,13);s.head.endFill();s.hair.clear();s.hair.beginFill(a.hair);s.hair.drawRoundedRect(-13,-68,26,12,6);s.hair.endFill();s.face.clear();s.face.beginFill(0x2a3140);const ex=a.facing<0?-3:3;s.face.drawCircle(ex-3,-56,1.2);s.face.drawCircle(ex+3,-56,1.2);s.face.lineStyle(1.6,0x784d44,1);s.face.moveTo(-2,-49);s.face.quadraticCurveTo(0,-47,2,-49);s.c.scale.x=a.facing;}
function pick(a){if(Math.random()>.83){const choices=rooms.filter(r=>r.id!==a.room),next=choices[Math.floor(Math.random()*choices.length)];a.room=next.id;a.say=`Idem u ${next.name}.`;a.bubble=140;}a.tu=.22+Math.random()*.56;a.td=.42+Math.random()*.34;a.wait=80+Math.random()*160;}function logic(){if(!state.speed)return;state.minute+=4*state.speed;if(state.minute>=1440){state.minute=7*60;state.day++;}state.cost+=.003*state.speed;state.agents.forEach(a=>{if(a.wait<=0)pick(a);else a.wait-=state.speed;a.u=lerp(a.u,a.tu,.022*state.speed);a.d=lerp(a.d,a.td,.022*state.speed);if(Math.abs(a.tu-a.u)>.005)a.facing=a.tu>a.u?1:-1;a.energy=clamp(a.energy-Math.random()*.25*state.speed);a.focus=clamp(a.focus+Math.random()*1.2-.6);a.mood=clamp(a.mood+Math.random()*.8-.4);if(a.bubble>0)a.bubble--;else if(Math.random()>.996){a.say=['Radim.','Treba review.','Sve ide dobro.','Imam ideju.'][Math.floor(Math.random()*4)];a.bubble=120;}});}function ui(){const list=document.getElementById('agentList');list.innerHTML='';state.agents.forEach(a=>{const b=document.createElement('button');b.className='agent-row '+(state.selected===a.id?'active':'');b.innerHTML=`<span class='avatar'>${a.avatar}</span><span><b>${a.name}</b><small>${a.role}</small></span>`;b.onclick=()=>{state.selected=a.id;ui();};list.appendChild(b);});const a=state.agents.find(x=>x.id===state.selected),r=roomById(a.room);document.getElementById('inspector').innerHTML=`<div class='profile'><div class='portrait'>${a.avatar}</div><div><h2>${a.name}</h2><p>${a.role} ┬Ę ${r.name}</p><span class='pill'>${a.model}</span></div></div><section><h3>Trenutni zadatak</h3><div class='card'>${a.task}</div></section><section class='meters'><h3>Potrebe</h3><label>ŌÜĪ Energija <progress value='${a.energy}' max='100'></progress></label><label>­¤Ä» Fokus <progress value='${a.focus}' max='100'></progress></label><label>­¤śŖ Mood <progress value='${a.mood}' max='100'></progress></label></section><section><h3>House pass</h3><div class='card'>Emoji po podu su zamijenjeni stiliziranim namje┼Ītajem: stolovi, stolice, laptopi, sofa, whiteboard, biljke i meeting stol. Ku─ća je ve─ća, ima krov i bolje sjedi na tlu.</div></section>`;const h=Math.floor(state.minute/60)%24,m=state.minute%60;document.getElementById('time').textContent=`Dan ${state.day} ┬Ę ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;document.getElementById('speed').textContent=state.speed===0?'PAUZA':state.speed===1?'PLAY':'FAST';document.getElementById('count').textContent=state.agents.length;document.getElementById('cost').textContent=`Ōé¼${state.cost.toFixed(2)}`;document.getElementById('pause').classList.toggle('active',state.speed===0);document.getElementById('play').classList.toggle('active',state.speed===1);document.getElementById('fast').classList.toggle('active',state.speed===3);}function place(){world.x=window.innerWidth/2;world.y=window.innerHeight/2+72;world.scale.set(zoom);}place();scene();state.agents.forEach(makeSprite);ui();app.ticker.add(t=>{const dt=t.deltaMS/1000;logic();state.agents.forEach(a=>sync(a,dt));ui();});document.getElementById('pause').onclick=()=>{state.speed=0;ui();};document.getElementById('play').onclick=()=>{state.speed=1;ui();};document.getElementById('fast').onclick=()=>{state.speed=3;ui();};document.getElementById('zoomIn').onclick=()=>{zoom=clamp(zoom+.08,.65,1.45);place();};document.getElementById('zoomOut').onclick=()=>{zoom=clamp(zoom-.08,.65,1.45);place();};document.getElementById('zoomHome').onclick=()=>{zoom=1;place();};window.addEventListener('resize',place);
</script>

<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sims OS Live Preview</title>
  <style>
    :root{--ink:#17233a;--muted:#6b7488;--glass:rgba(255,255,255,.86);--line:rgba(31,43,70,.12)}
    *{box-sizing:border-box} body{margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:#8fc9ee;color:var(--ink)}
    #stage{position:fixed;inset:0} canvas{display:block;width:100vw;height:100vh}
    .hud{position:fixed;z-index:5;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:var(--glass);border:1px solid rgba(255,255,255,.65);box-shadow:0 18px 48px rgba(44,67,101,.2)}
    .top{left:18px;right:18px;top:14px;height:68px;border-radius:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}
    .brand{display:flex;align-items:center;gap:12px}.gem{width:28px;height:28px;background:#49ce70;transform:rotate(45deg);box-shadow:0 10px 24px rgba(73,206,112,.42);border-radius:4px}.brand small{display:block;color:var(--muted);font-weight:600}.clock{display:flex;gap:12px;align-items:center}.clock span{font-weight:900;padding:7px 10px;background:#edf3fb;border-radius:999px;font-size:12px}
    .left,.right{top:100px;bottom:92px;width:260px;border-radius:26px;padding:16px;overflow:auto}.left{left:18px}.right{right:18px;width:320px}.left h2,.right h2{margin:0 0 12px}.agent-row{width:100%;border:1px solid transparent;background:#f4f7fc;border-radius:16px;padding:10px;margin:0 0 8px;display:flex;align-items:center;gap:10px;text-align:left;cursor:pointer}.agent-row:hover,.agent-row.active{background:white;border-color:#72a8ef}.avatar{font-size:27px}.agent-row small{display:block;color:var(--muted)}
    .right .portrait{font-size:44px;width:70px;height:70px;border-radius:24px;background:#eef4fb;display:grid;place-items:center}.profile{display:flex;gap:13px;align-items:center}.pill{display:inline-block;background:#eaf0fb;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.card{background:#f1f5fb;border-radius:16px;padding:12px;margin:8px 0 14px}.meters label{display:block;color:var(--muted);font-size:12px;margin:9px 0}.meters progress{width:100%;height:11px;accent-color:#63c876}.bottom{left:50%;bottom:16px;transform:translateX(-50%);height:64px;border-radius:24px;width:min(760px,calc(100vw - 40px));display:flex;align-items:center;justify-content:space-between;padding:0 14px}.controls{display:flex;gap:8px}.controls button,.zoom button,.wide{border:0;border-radius:14px;background:#edf2fa;color:var(--ink);font-weight:900;cursor:pointer;padding:10px 13px}.controls button.active{background:#5a8df0;color:white}.zoom{display:flex;gap:8px}.wide{width:100%;background:#263b64;color:white}.hint{position:fixed;z-index:4;left:50%;bottom:94px;transform:translateX(-50%);background:rgba(31,47,75,.82);color:white;border-radius:999px;padding:8px 13px;font-size:12px}.live-badge{color:#128a42;font-weight:900}
    @media(max-width:950px){.left{display:none}.right{display:none}.top{left:10px;right:10px}.brand small{display:none}.hint{display:none}}
  </style>
</head>
<body>
  <div id="stage"></div>
  <header class="hud top">
    <div class="brand"><div class="gem"></div><div><strong>AI Sims OS</strong><small><span class="live-badge">LIVE</span> smooth sims · engine v3 tracker</small></div></div>
    <div class="clock"><strong id="time">Dan 1 · 09:00</strong><span id="speed">PLAY</span></div>
    <div class="zoom"><button id="zoomOut">−</button><button id="zoomHome">⌂</button><button id="zoomIn">＋</button></div>
  </header>
  <aside class="hud left"><h2>AI tim</h2><div id="agentList"></div><button id="newTask" class="wide">＋ Novi zadatak</button></aside>
  <aside class="hud right"><div id="inspector"></div></aside>
  <footer class="hud bottom"><div class="controls"><button id="pause">⏸</button><button id="play" class="active">▶</button><button id="fast">▶▶</button></div><div><b id="count">6</b> agenata · <b id="cost">€0.00</b></div><button id="reset" class="wide" style="width:auto;background:#f8e5e5;color:#9d3636">Reset</button></footer>
  <div class="hint">Likovi sada imaju glatko hodanje · klikni agenta · kotačić za zoom</div>

  <script type="module">
    import * as PIXI from 'https://esm.sh/pixi.js@7.4.3';

    const rooms = [
      {id:'ceo', name:'CEO Office', floor:1, col:0, span:1, color:0xf3c1d1, items:['🪑','💻','📌']},
      {id:'research', name:'Research', floor:1, col:1, span:1, color:0xb9e3d0, items:['🔬','📚','🧠']},
      {id:'meeting', name:'Meeting', floor:1, col:2, span:1, color:0xe9dfbd, items:['📋','🪑','🧩']},
      {id:'lounge', name:'Lounge', floor:0, col:0, span:1, color:0xd7e7bc, items:['🛋️','☕','🌿']},
      {id:'dev', name:'Development', floor:0, col:1, span:1, color:0xb8d8f5, items:['💻','🖥️','☕']},
      {id:'studio', name:'Creative Studio', floor:0, col:2, span:1, color:0xf6d69b, items:['🎨','📸','🪴']},
      {id:'qa', name:'QA Lab', floor:0, col:3, span:1, color:0xd2c5ee, items:['🧪','🖥️','✅']}
    ];

    const defaults = [
      {id:'alpha',avatar:'🧠',name:'Alpha',role:'CEO agent',model:'Qwen 3',room:'ceo',u:.45,d:.58,targetU:.45,targetD:.58,shirt:0xe86c91,hair:0x53372f,skin:0xf0bd8f,pants:0x26334d,task:'Planira AI firmu',energy:88,focus:82,mood:86,say:'Provjeravam sprint.',bubbleT:2.5,wait:.8,phase:0,dir:1,mode:'idle'},
      {id:'nova',avatar:'👩‍💻',name:'Nova',role:'Developer',model:'DeepSeek Coder',room:'dev',u:.52,d:.60,targetU:.52,targetD:.60,shirt:0x547de8,hair:0x352a28,skin:0xf2c59a,pants:0x1f2f50,task:'Gradi renderer',energy:73,focus:91,mood:75,say:'Buildam engine.',bubbleT:2.5,wait:1.4,phase:0,dir:1,mode:'idle'},
      {id:'atlas',avatar:'🔎',name:'Atlas',role:'Researcher',model:'Llama 3.3',room:'research',u:.44,d:.56,targetU:.44,targetD:.56,shirt:0x42a983,hair:0x68452f,skin:0xe8b98a,pants:0x24403a,task:'Istražuje workflow',energy:81,focus:87,mood:79,say:'Tražim bolji flow.',bubbleT:2.5,wait:2,phase:0,dir:-1,mode:'idle'},
      {id:'mira',avatar:'✍️',name:'Mira',role:'Creative agent',model:'Gemma 3',room:'studio',u:.52,d:.62,targetU:.52,targetD:.62,shirt:0xe5a33d,hair:0x875339,skin:0xf1c092,pants:0x4d3b58,task:'Radi vizuale',energy:77,focus:74,mood:92,say:'Dodajem toplinu.',bubbleT:2.5,wait:1.1,phase:0,dir:-1,mode:'idle'},
      {id:'pixel',avatar:'🧪',name:'Pixel',role:'QA agent',model:'Mistral',room:'qa',u:.45,d:.58,targetU:.45,targetD:.58,shirt:0x8a68d8,hair:0x342c42,skin:0xe9b58f,pants:0x25334d,task:'Testira interakcije',energy:69,focus:89,mood:71,say:'Našao sam bug.',bubbleT:2.5,wait:1.8,phase:0,dir:1,mode:'idle'},
      {id:'bolt',avatar:'⚙️',name:'Bolt',role:'Ops agent',model:'Qwen 3',room:'lounge',u:.47,d:.59,targetU:.47,targetD:.59,shirt:0x67a64c,hair:0x493f31,skin:0xd9a47c,pants:0x26334d,task:'Prati deploy',energy:64,focus:68,mood:84,say:'Deploy je živ.',bubbleT:2.5,wait:1.6,phase:0,dir:1,mode:'idle'}
    ];

    let state = JSON.parse(localStorage.getItem('ai-sims-live-v4') || 'null') || {agents:defaults,selected:'alpha',minute:9*60,day:1,speed:1,cost:0};
    state.agents.forEach((a,i)=>{Object.assign(defaults[i]||{},a); state.agents[i]=Object.assign({},defaults[i]||a,a);});

    const app = new PIXI.Application({resizeTo:window,backgroundColor:0x8fc9ee,antialias:true,resolution:window.devicePixelRatio||1,autoDensity:true});
    document.getElementById('stage').appendChild(app.view);

    const world = new PIXI.Container(); app.stage.addChild(world);
    const staticLayer = new PIXI.Container();
    const agentLayer = new PIXI.Container();
    world.addChild(staticLayer, agentLayer);

    let zoom=1, dragging=false, dragStart={x:0,y:0,wx:0,wy:0}, uiAccum=0, saveAccum=0;
    const nodes = new Map();
    const roomById=id=>rooms.find(r=>r.id===id); const agentById=id=>state.agents.find(a=>a.id===id);
    const save=()=>localStorage.setItem('ai-sims-live-v4',JSON.stringify(state));
    const clamp=(n,a=0,b=100)=>Math.max(a,Math.min(b,n));
    const lerp=(a,b,t)=>a+(b-a)*t;

    const layout = {roomW:205, roomH:126, depth:58, floorGap:44, wall:12, x0:-420, y0:-210};
    function roomRect(room){const w=layout.roomW*room.span; const x=layout.x0+room.col*layout.roomW; const y=layout.y0+(1-room.floor)*(layout.roomH+layout.depth+layout.floorGap); return {x,y,w,h:layout.roomH,d:layout.depth};}
    function agentPosition(a){const rr=roomRect(roomById(a.room));return {x:rr.x+rr.w*a.u+rr.d*.45*a.d,y:rr.y+rr.h+rr.d*a.d};}
    function doorPoint(roomId){const r=roomById(roomId); return r.col===0 ? {u:.9,d:.92} : {u:.12,d:.92};}
    function setTarget(a,u,d){a.targetU=clamp(u,.16,.84); a.targetD=clamp(d,.34,.88); a.mode='walk';}

    function poly(g,pts,fill,line=0x6f6259,alpha=1){g.lineStyle(2,line,.85);g.beginFill(fill,alpha);g.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();g.endFill();}
    function label(text,x,y,size=14,color=0x25344d){const t=new PIXI.Text(text,{fontFamily:'Arial',fontSize:size,fontWeight:'700',fill:color,stroke:0xffffff,strokeThickness:3});t.x=x;t.y=y;return t;}

    function drawStaticWorld(){
      staticLayer.removeChildren();
      const sky=new PIXI.Graphics();
      sky.beginFill(0x8fc9ee);sky.drawRect(-3000,-3000,6000,6000);sky.endFill();
      sky.beginFill(0xfff2a6,.8);sky.drawCircle(520,-350,64);sky.endFill();
      sky.beginFill(0x78bd70);sky.drawRect(-3000,340,6000,3000);sky.endFill();
      staticLayer.addChild(sky);

      const shell=new PIXI.Graphics();
      const x=layout.x0-28, top=layout.y0-56, w=layout.roomW*4+56, h=(layout.roomH+layout.depth)*2+layout.floorGap+72;
      shell.beginFill(0x9b755f);shell.drawRoundedRect(x-10,top-10,w+20,18,8);shell.endFill();
      shell.beginFill(0xf7efe5);shell.drawRoundedRect(x,top,w,h,10);shell.endFill();
      shell.beginFill(0xd9c7b4);shell.drawRect(x,top+h-16,w,24);shell.endFill();
      shell.beginFill(0x000000,.09);shell.drawRoundedRect(x+18,top+h-5,w-36,30,18);shell.endFill();
      staticLayer.addChild(shell);

      const roomsLayer=new PIXI.Container(); staticLayer.addChild(roomsLayer);
      rooms.filter(r=>r.floor===1).forEach(r=>drawRoom(roomsLayer,r));
      drawSlab(staticLayer,layout.y0+layout.roomH+layout.depth+18);
      rooms.filter(r=>r.floor===0).forEach(r=>drawRoom(roomsLayer,r));
      drawStairs(staticLayer);
    }

    function drawRoom(layer,room){
      const r=roomRect(room), d=r.d; const g=new PIXI.Graphics();
      g.beginFill(0xfffbf5);g.drawRect(r.x,r.y,r.w,r.h);g.endFill();
      g.beginFill(room.color,.55);g.drawRect(r.x+6,r.y+8,r.w-12,r.h-14);g.endFill();
      poly(g,[[r.x,r.y],[r.x+d*.45,r.y+d*.42],[r.x+d*.45,r.y+r.h+d*.42],[r.x,r.y+r.h]],0xe6d9ca);
      poly(g,[[r.x+r.w,r.y],[r.x+r.w+d*.45,r.y+d*.42],[r.x+r.w+d*.45,r.y+r.h+d*.42],[r.x+r.w,r.y+r.h]],0xd8cbbd);
      poly(g,[[r.x,r.y+r.h],[r.x+r.w,r.y+r.h],[r.x+r.w+d*.45,r.y+r.h+d],[r.x+d*.45,r.y+r.h+d]],room.color,0x75685e);
      g.lineStyle(7,0x6f6259,.38);g.moveTo(r.x,r.y);g.lineTo(r.x,r.y+r.h);g.moveTo(r.x+r.w,r.y);g.lineTo(r.x+r.w,r.y+r.h);g.moveTo(r.x,r.y+r.h);g.lineTo(r.x+r.w,r.y+r.h);
      g.lineStyle(1,0xffffff,.28);
      for(let i=1;i<4;i++){const xx=r.x+(r.w/4)*i;g.moveTo(xx,r.y+r.h);g.lineTo(xx+d*.45,r.y+r.h+d)}
      for(let i=1;i<3;i++){const yy=r.y+r.h+(d/3)*i;g.moveTo(r.x+d*.15*i,yy);g.lineTo(r.x+r.w+d*.15*i,yy)}
      layer.addChild(g); layer.addChild(label(room.name,r.x+14,r.y+12));
      room.items.forEach((item,i)=>{const t=new PIXI.Text(item,{fontSize:29,dropShadow:true,dropShadowDistance:3});t.anchor.set(.5);t.x=r.x+r.w*(.25+.24*i);t.y=r.y+r.h+d*(.48+.08*(i%2));layer.addChild(t);});
    }

    function drawSlab(layer,y){const g=new PIXI.Graphics();const x=layout.x0-14,w=layout.roomW*4+28;g.beginFill(0x9d8876);g.drawRect(x,y,w,15);g.endFill();g.beginFill(0x75685e);g.drawRect(x,y+14,w,10);g.endFill();layer.addChild(g);}
    function drawStairs(layer){const g=new PIXI.Container();const bottom=roomRect(roomById('dev')), top=roomRect(roomById('research'));for(let i=0;i<11;i++){const step=new PIXI.Graphics();const x=bottom.x+bottom.w-26+i*10,y=bottom.y+bottom.h+bottom.d-18-i*18;poly(step,[[x,y],[x+46,y+6],[x+30,y+18],[x-14,y+10]],i%2?0xc9baa8:0xddd0bf,0xa89786);g.addChild(step);}const rail=new PIXI.Graphics();rail.lineStyle(4,0x6f6259,.65);rail.moveTo(bottom.x+bottom.w-32,bottom.y+bottom.h+bottom.d-48);rail.lineTo(top.x+18,top.y+top.h+top.d+20);g.addChild(rail);layer.addChild(g);}

    function makeAgentNode(a){
      const c=new PIXI.Container(); c.eventMode='static'; c.cursor='pointer'; c.on('pointertap',()=>{state.selected=a.id;save();renderUI();});
      c.shadow=new PIXI.Graphics(); c.addChild(c.shadow);
      c.backArm=new PIXI.Graphics(); c.addChild(c.backArm);
      c.backLeg=new PIXI.Graphics(); c.addChild(c.backLeg);
      c.body=new PIXI.Graphics(); c.addChild(c.body);
      c.frontLeg=new PIXI.Graphics(); c.addChild(c.frontLeg);
      c.frontArm=new PIXI.Graphics(); c.addChild(c.frontArm);
      c.head=new PIXI.Graphics(); c.addChild(c.head);
      c.face=new PIXI.Graphics(); c.addChild(c.face);
      c.gem=new PIXI.Graphics(); c.addChild(c.gem);
      c.nameText=label(a.name,0,21,13,0xffffff); c.nameText.anchor.set(.5,0); c.nameText.style.stroke=0x1f2a3e; c.nameText.style.strokeThickness=4; c.addChild(c.nameText);
      c.bubble=new PIXI.Container(); c.bubbleBg=new PIXI.Graphics(); c.bubble.addChild(c.bubbleBg); c.bubbleText=new PIXI.Text('',{fontSize:11,fill:0x17233a,wordWrap:true,wordWrapWidth:118}); c.bubbleText.x=8; c.bubbleText.y=6; c.bubble.addChild(c.bubbleText); c.bubble.x=24; c.bubble.y=-116; c.addChild(c.bubble);
      agentLayer.addChild(c); nodes.set(a.id,c); return c;
    }

    function redrawAgent(c,a,dt){
      const p=agentPosition(a); c.x=p.x; c.y=p.y; c.zIndex=p.y;
      const walking=a.mode==='walk'; const stride=Math.sin(a.phase)*10; const bob=walking?Math.abs(Math.sin(a.phase))*3:Math.sin(a.phase*.45)*.8; const dir=a.dir||1;
      c.scale.x=dir;
      c.y-=bob;
      c.shadow.clear();c.shadow.beginFill(0x000000,.18);c.shadow.drawEllipse(0,8,24,8);c.shadow.endFill();
      c.gem.clear(); if(state.selected===a.id){c.gem.beginFill(0x4ed16f);c.gem.moveTo(0,-104);c.gem.lineTo(12,-82);c.gem.lineTo(0,-58);c.gem.lineTo(-12,-82);c.gem.closePath();c.gem.endFill();}
      drawLimb(c.backLeg,-8,-9,-10+stride*.18,13,a.pants,5); drawLimb(c.frontLeg,7,-8,10-stride*.18,13,a.pants,5);
      drawLimb(c.backArm,-14,-38,-16-stride*.12,-16,a.skin,5); drawLimb(c.frontArm,14,-37,16+stride*.12,-15,a.skin,5);
      c.body.clear();c.body.beginFill(a.shirt);c.body.drawRoundedRect(-14,-45,28,38,9);c.body.endFill();c.body.beginFill(0xffffff,.16);c.body.drawRoundedRect(-10,-41,8,30,5);c.body.endFill();
      c.head.clear();c.head.beginFill(a.skin);c.head.drawCircle(0,-61,15);c.head.endFill();c.head.beginFill(a.hair);c.head.drawRoundedRect(-15,-76,30,16,8);c.head.drawCircle(-9,-66,8);c.head.drawCircle(9,-66,8);c.head.endFill();
      c.face.clear();c.face.beginFill(0x1d2637);c.face.drawCircle(-5,-61,2);c.face.drawCircle(5,-61,2);c.face.endFill();c.face.lineStyle(1.6,0x8b4e47,.9); if(a.mood>70){c.face.arc(0,-58,5,0.15*Math.PI,0.85*Math.PI)}else{c.face.moveTo(-4,-54);c.face.lineTo(4,-54)}
      c.bubble.visible=a.bubbleT>0; if(c.bubble.visible){c.bubbleBg.clear();c.bubbleBg.beginFill(0xffffff,.96);c.bubbleBg.drawRoundedRect(0,0,134,38,12);c.bubbleBg.endFill();c.bubbleText.text=a.say||a.task; c.bubble.alpha=clamp(a.bubbleT/0.4,0,1);}
    }
    function drawLimb(g,x1,y1,x2,y2,color,width){g.clear();g.lineStyle(width,color,1);g.moveTo(x1,y1);g.lineTo(x2,y2);g.lineStyle(Math.max(2,width-1),0x1d2637,.35);g.moveTo(x2,y2);g.lineTo(x2+3,y2+2);}

    function ensureAgents(){state.agents.forEach(a=>{if(!nodes.has(a.id))makeAgentNode(a);}); agentLayer.sortableChildren=true;}

    function decide(a){
      const roll=Math.random();
      if(roll<.7){setTarget(a,.22+Math.random()*.56,.38+Math.random()*.44); a.say=['Idem do stola.','Provjeravam status.','Malo se premještam.','Tražim bolji kut.'][Math.floor(Math.random()*4)]; a.bubbleT=1.8;}
      else{const currentDoor=doorPoint(a.room); a.travel={stage:'leaving',next:rooms.filter(r=>r.id!==a.room)[Math.floor(Math.random()*(rooms.length-1))].id}; setTarget(a,currentDoor.u,currentDoor.d); a.say=`Idem u ${roomById(a.travel.next).name}.`; a.bubbleT=2.2;}
    }
    function updateAgent(a,dt){
      a.wait-=dt; a.bubbleT=Math.max(0,(a.bubbleT||0)-dt); a.energy=clamp(a.energy-dt*.035*state.speed); a.focus=clamp(a.focus+(Math.random()-.5)*dt*1.8); a.mood=clamp(a.mood+(Math.random()-.5)*dt*1.2);
      const du=(a.targetU??a.u)-a.u, dd=(a.targetD??a.d)-a.d; const dist=Math.hypot(du,dd);
      if(dist>.008){const speed=(0.18+state.speed*.035)*dt; const step=Math.min(speed,dist); a.dir=du>=0?1:-1; a.u+=du/dist*step; a.d+=dd/dist*step; a.mode='walk'; a.phase+=dt*9.5*(state.speed||1);}
      else{a.u=a.targetU??a.u; a.d=a.targetD??a.d; a.mode='idle'; a.phase+=dt*2; if(a.travel?.stage==='leaving'){a.room=a.travel.next; const dp=doorPoint(a.room); a.u=dp.u; a.d=dp.d; a.targetU=.25+Math.random()*.5; a.targetD=.42+Math.random()*.38; a.travel={stage:'entering'}; a.say=`Stigao u ${roomById(a.room).name}.`; a.bubbleT=1.8;} else if(a.travel?.stage==='entering'){a.travel=null; a.wait=1.8+Math.random()*3.2;} else if(a.wait<=0){decide(a); a.wait=2.5+Math.random()*5;}}
    }

    function renderUI(){
      const list=document.getElementById('agentList');list.innerHTML='';
      state.agents.forEach(a=>{const b=document.createElement('button');b.className='agent-row '+(state.selected===a.id?'active':'');b.innerHTML=`<span class="avatar">${a.avatar}</span><span><b>${a.name}</b><small>${a.role}</small></span>`;b.onclick=()=>{state.selected=a.id;save();renderUI();};list.appendChild(b);});
      const a=agentById(state.selected), r=roomById(a.room);document.getElementById('inspector').innerHTML=`<div class="profile"><div class="portrait">${a.avatar}</div><div><h2>${a.name}</h2><p>${a.role} · ${r.name}</p><span class="pill">${a.model}</span></div></div><section><h3>Trenutni zadatak</h3><div class="card">${a.task}</div></section><section class="meters"><h3>Potrebe</h3><label>⚡ Energija <progress value="${a.energy}" max="100"></progress></label><label>🎯 Fokus <progress value="${a.focus}" max="100"></progress></label><label>😊 Mood <progress value="${a.mood}" max="100"></progress></label></section><section><h3>Sprite pass</h3><div class="card">Likovi sada imaju glatku interpolaciju, animirane noge/ruke, smjer gledanja, stabilne balončiće i manje slučajnog trzanja.</div></section>`;
      const h=Math.floor(state.minute/60)%24,m=state.minute%60;document.getElementById('time').textContent=`Dan ${state.day} · ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;document.getElementById('speed').textContent=state.speed===0?'PAUZA':state.speed===1?'PLAY':'FAST';document.getElementById('count').textContent=state.agents.length;document.getElementById('cost').textContent=`€${state.cost.toFixed(2)}`;
      document.getElementById('pause').classList.toggle('active',state.speed===0);document.getElementById('play').classList.toggle('active',state.speed===1);document.getElementById('fast').classList.toggle('active',state.speed===3);
    }

    function fitWorld(){world.x=window.innerWidth/2-20;world.y=window.innerHeight/2+60;world.scale.set(zoom);}
    drawStaticWorld(); ensureAgents(); fitWorld(); renderUI();

    app.ticker.add(delta=>{
      const dt=Math.min(0.05,delta/60)*(state.speed||1);
      if(state.speed){state.minute+=dt*16; if(state.minute>=1440){state.minute=7*60;state.day++;} state.cost+=dt*.006; state.agents.forEach(a=>updateAgent(a,dt));}
      state.agents.forEach(a=>{const node=nodes.get(a.id)||makeAgentNode(a);redrawAgent(node,a,dt||0.016);}); agentLayer.children.sort((a,b)=>a.zIndex-b.zIndex);
      uiAccum+=delta/60; saveAccum+=delta/60; if(uiAccum>.45){renderUI();uiAccum=0;} if(saveAccum>3){save();saveAccum=0;}
    });

    document.getElementById('pause').onclick=()=>{state.speed=0;renderUI();};
    document.getElementById('play').onclick=()=>{state.speed=1;renderUI();};
    document.getElementById('fast').onclick=()=>{state.speed=3;renderUI();};
    document.getElementById('zoomIn').onclick=()=>{zoom=clamp(zoom+.08,.65,1.45);fitWorld();};
    document.getElementById('zoomOut').onclick=()=>{zoom=clamp(zoom-.08,.65,1.45);fitWorld();};
    document.getElementById('zoomHome').onclick=()=>{zoom=1;fitWorld();};
    document.getElementById('newTask').onclick=()=>{const t=prompt('Novi zadatak za AI kompaniju:');if(!t)return;const a=agentById(state.selected);a.task=t;a.say='Primljeno. Krećem.';a.bubbleT=2.2;setTarget(a,.3+Math.random()*.4,.45+Math.random()*.35);save();renderUI();};
    document.getElementById('reset').onclick=()=>{if(confirm('Resetirati live svijet?')){localStorage.removeItem('ai-sims-live-v4');location.reload();}};
    app.view.addEventListener('wheel',e=>{e.preventDefault();zoom=clamp(zoom-e.deltaY*.001,.65,1.45);world.scale.set(zoom);},{passive:false});
    app.view.addEventListener('pointerdown',e=>{dragging=true;dragStart={x:e.clientX,y:e.clientY,wx:world.x,wy:world.y};});
    window.addEventListener('pointermove',e=>{if(!dragging)return;world.x=dragStart.wx+e.clientX-dragStart.x;world.y=dragStart.wy+e.clientY-dragStart.y;});
    window.addEventListener('pointerup',()=>dragging=false);
    window.addEventListener('resize',()=>fitWorld());
  </script>
</body>
</html>

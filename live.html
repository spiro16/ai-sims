function room(id){return rooms.find(r=>r.id===id)}function agent(id){return agents.find(a=>a.id===id)}function rect(r){let w=layout.roomW*r.span,x=layout.x0+r.col*layout.roomW,y=layout.y0+(1-r.floor)*(layout.roomH+layout.depth+layout.floorGap);return{x,y,w,h:layout.roomH,d:layout.depth}}function centerRoom(id){let r=rect(room(id));return{u:.35+Math.random()*.3,d:.5+Math.random()*.25,px:r.x+r.w*.5,py:r.y+r.h+r.d*.6}}function addLog(s){log.unshift(s);log=log.slice(0,10)}

function drawFurniture(r,kind){let x=r.x,y=r.y,w=r.w,h=r.h,d=r.d;function desk(dx,dy){rr(x+dx,y+h+dy,62,26,6,'#9d6e4a');ctx.fillStyle='#755136';ctx.fillRect(x+dx+5,y+h+dy+23,6,18);ctx.fillRect(x+dx+51,y+h+dy+23,6,18);rr(x+dx+18,y+h+dy-18,26,18,3,'#546a86');ctx.fillStyle='#c7ecff';ctx.fillRect(x+dx+21,y+h+dy-15,20,12)}function chair(dx,dy,col='#596f8e'){rr(x+dx,y+h+dy,20,16,5,col);ctx.fillRect(x+dx+2,y+h+dy+12,4,16);ctx.fillRect(x+dx+14,y+h+dy+12,4,16);ctx.fillRect(x+dx+2,y+h+dy-10,4,12);ctx.fillRect(x+dx+14,y+h+dy-10,4,12)}function board(dx,dy){rr(x+dx,y+dy,84,42,6,'#fafcff');ctx.strokeStyle='#8ea3b5';ctx.strokeRect(x+dx,y+dy,84,42);ctx.fillStyle='#91b0c8';ctx.fillRect(x+dx+10,y+dy+10,24,4);ctx.fillRect(x+dx+10,y+dy+18,42,4);ctx.fillRect(x+dx+10,y+dy+26,30,4)}function plant(dx,dy){rr(x+dx+8,y+h+dy+16,16,12,4,'#8e623f');ctx.fillStyle='#5ea157';ctx.beginPath();ctx.arc(x+dx+14,y+h+dy+8,10,0,7);ctx.arc(x+dx+24,y+h+dy+5,9,0,7);ctx.arc(x+dx+19,y+h+dy-5,10,0,7);ctx.fill()}function sofa(dx,dy){rr(x+dx,y+h+dy,72,28,10,'#8eb27a');rr(x+dx,y+h+dy-18,72,18,10,'#8eb27a');rr(x+dx-8,y+h+dy-6,10,30,8,'#789d66');rr(x+dx+70,y+h+dy-6,10,30,8,'#789d66')}function table(dx,dy){rr(x+dx,y+h+dy,92,30,10,'#a57854');ctx.fillStyle='#765136';ctx.fillRect(x+dx+8,y+h+dy+25,5,20);ctx.fillRect(x+dx+79,y+h+dy+25,5,20)}

function drawRoom(rm){let r=rect(rm),d=r.d;ctx.fillStyle='#fffbf5';ctx.fillRect(r.x,r.y,r.w,r.h);ctx.globalAlpha=.56;ctx.fillStyle=rm.color;ctx.fillRect(r.x+8,r.y+8,r.w-16,r.h-16);ctx.globalAlpha=1;poly([[r.x,r.y],[r.x+d*.45,r.y+d*.42],[r.x+d*.45,r.y+r.h+d*.42],[r.x,r.y+r.h]],'#e8dac9');poly([[r.x+r.w,r.y],[r.x+r.w+d*.45,r.y+d*.42],[r.x+r.w+d*.45,r.y+r.h+d*.42],[r.x+r.w,r.y+r.h]],'#d8cbbd');poly([[r.x,r.y+r.h],[r.x+r.w,r.y+r.h],[r.x+r.w+d*.45,r.y+r.h+d],[r.x+d*.45,r.y+r.h+d]],rm.color);ctx.strokeStyle='rgba(111,98,89,.45)';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x,r.y+r.h);ctx.moveTo(r.x+r.w,r.y);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.moveTo(r.x,r.y+r.h);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.stroke();drawWindow(r.x+18,r.y+18);if(r.w>300)drawWindow(r.x+r.w-82,r.y+18);ctx.font='700 14px Arial';ctx.fillStyle='#25344d';ctx.fillText(rm.name,r.x+14,r.y+22);drawFurniture(r,rm.kind)}
function agentPos(a){let r=rect(room(a.room));return{x:r.x+r.w*a.u+r.d*.45*a.d,y:r.y+r.h+r.d*a.d}}
function drawAgent(a){let p=agentPos(a);ctx.save();ctx.translate(p.x,p.y);ctx.scale(a.face,1);let moving=Math.abs(a.tu-a.u)+Math.abs(a.td-a.d)>.015;a.phase+=moving?.18:.04;let s=moving?Math.sin(a.phase)*5:Math.sin(a.phase)*1.2;ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.ellipse(0,8,18,6,0,0,7);ctx.fill();if(state.selected===a.id){ctx.fillStyle='#4ed16f';ctx.beginPath();ctx.moveTo(0,-78);ctx.lineTo(10,-60);ctx.lineTo(0,-42);ctx.lineTo(-10,-60);ctx.closePath();ctx.fill()}ctx.strokeStyle='#25334d';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-6,-6);ctx.lineTo(-6+s,15);ctx.moveTo(6,-6);ctx.lineTo(6-s,15);ctx.stroke();ctx.strokeStyle='#f0bd8f';ctx.beginPath();ctx.moveTo(-12,-34);ctx.lineTo(-14-s*.5,-13);ctx.moveTo(12,-34);ctx.lineTo(14+s*.5,-13);ctx.stroke();rr(-13,-44,26,32,8,a.shirt);ctx.fillStyle='#f0bd8f';ctx.beginPath();ctx.arc(0,-60,14,0,7);ctx.fill();rr(-14,-74,28,14,7,a.hair);ctx.fillStyle='#2a3140';ctx.beginPath();ctx.arc(0,-60,1.4,0,7);ctx.arc(7,-60,1.4,0,7);ctx.fill();ctx.scale(a.face,1);ctx.restore();ctx.font='700 12px Arial';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='#1f2a3e';ctx.strokeText(a.name,p.x,p.y+22);ctx.fillStyle='#fff';ctx.fillText(a.name,p.x,p.y+22);if(a.say&&a.bubble>0){ctx.textAlign='left';rr(p.x+20,p.y-104,142,38,12,'rgba(255,255,255,.96)');ctx.font='11px Arial';ctx.fillStyle='#17233a';wrapText(a.say,p.x+29,p.y-88,124,13)}}
function wrapText(t,x,y,w,lh){let words=t.split(' '),line='';for(let n=0;n<words.length;n++){let test=line+words[n]+' ';if(ctx.measureText(test).width>w&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lh}else line=test}ctx.fillText(line,x,y)}
function draw(){ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(W/2,H/2+72);ctx.scale(zoom,zoom);ctx.fillStyle='#8fc9ee';ctx.fillRect(-4000,-3000,8000,6000);ctx.fillStyle='rgba(255,242,166,.85)';ctx.beginPath();ctx.arc(650,-360,68,0,7);ctx.fill();ctx.fillStyle='#7dc271';ctx.fillRect(-4000,360,8000,3000);ctx.fillStyle='rgba(93,150,83,.22)';ctx.beginPath();ctx.ellipse(40,390,900,78,0,0,7);ctx.fill();let hx=layout.x0-34,top=layout.y0-22,hw=layout.roomW*4+68,hh=(layout.roomH+layout.depth)*2+layout.floorGap+28;poly([[layout.x0-50,layout.y0-34],[layout.x0+layout.roomW*2,layout.y0-118],[layout.x0+layout.roomW*4+46,layout.y0-34],[layout.x0+layout.roomW*2,layout.y0+6]],'#b35e4e','#7e4136');rr(hx,top,hw,hh,12,'#eedcc7');ctx.fillStyle='#d0b79c';ctx.fillRect(hx-14,top+hh-8,hw+28,24);rooms.filter(r=>r.floor===1).forEach(drawRoom);ctx.fillStyle='#9d8876';ctx.fillRect(layout.x0-18,layout.y0+layout.roomH+layout.depth+22,layout.roomW*4+36,18);ctx.fillStyle='#75685e';ctx.fillRect(layout.x0-18,layout.y0+layout.roomH+layout.depth+38,layout.roomW*4+36,12);rooms.filter(r=>r.floor===0).forEach(drawRoom);agents.slice().sort((a,b)=>agentPos(a).y-agentPos(b).y).forEach(drawAgent);ctx.restore();requestAnimationFrame(draw)}
function step(){if(!state.speed)return;state.minute+=2*state.speed;if(state.minute>=1440){state.minute=7*60;state.day++}state.cost+=.0015*state.speed;state.lastStep++;agents.forEach(a=>{a.u=lerp(a.u,a.tu,.02*state.speed);a.d=lerp(a.d,a.td,.02*state.speed);if(Math.abs(a.tu-a.u)>.003)a.face=a.tu>a.u?1:-1;if(a.bubble>0)a.bubble--;a.energy=Math.max(0,a.energy-.03*state.speed);a.focus=Math.max(0,Math.min(100,a.focus+(Math.random()-.5)*.4));a.mood=Math.max(0,Math.min(100,a.mood+(Math.random()-.5)*.4))});if(state.lastStep%35===0){advanceWork();assignRooms();agents.forEach(a=>{a.bubble=110;a.say=a.task})}renderUI()}
function renderUI(){let list=document.getElementById('agentList');list.innerHTML='';agents.forEach(a=>{let b=document.createElement('button');b.className='agent-row '+(state.selected===a.id?'active':'');b.innerHTML=`<span class="avatar">${a.avatar}</span><span><b>${a.name}</b><small>${a.role} · ${room(a.room).name}</small></span>`;b.onclick=()=>{state.selected=a.id;renderUI()};list.appendChild(b)});let groups=['backlog','doing','review','done'];document.getElementById('taskBoard').innerHTML=`<div class="columns">${groups.map(g=>`<div class="col"><h4>${statusLabel(g)}</h4>${tasks.filter(t=>t.status===g).map(t=>`<div class="task"><b>${t.title}</b><small>${agent(t.owner).name} · ${Math.round(t.progress)}%</small></div>`).join('')||'<div class="task"><small>prazno</small></div>'}</div>`).join('')}</div>`;document.getElementById('eventLog').innerHTML=log.map(x=>`<div>${x}</div>`).join('');let h=Math.floor(state.minute/60)%24,m=state.minute%60;document.getElementById('time').textContent=`Dan ${state.day} · ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;document.getElementById('speed').textContent=state.speed===0?'PAUZA':state.speed===1?'PLAY':'FAST';document.getElementById('count').textContent=agents.length;document.getElementById('done').textContent=tasks.filter(t=>t.status==='done').length;document.getElementById('cost').textContent=`€${state.cost.toFixed(2)}`;document.getElementById('pause').classList.toggle('active',state.speed===0);document.getElementById('play').classList.toggle('active',state.speed===1);document.getElementById('fast').classList.toggle('active',state.speed===3)}
document.getElementById('pause').onclick=()=>{state.speed=0;renderUI()};document.getElementById('play').onclick=()=>{state.speed=1;renderUI()};document.getElementById('fast').onclick=()=>{state.speed=3;renderUI()};document.getElementById('zoomIn').onclick=()=>{zoom=Math.min(1.35,zoom+.08)};document.getElementById('zoomOut').onclick=()=>{zoom=Math.max(.65,zoom-.08)};document.getElementById('zoomHome').onclick=()=>{zoom=1};document.getElementById('newTask').onclick=rndTask;assignRooms();renderUI();setInterval(step,220);draw();
</script>

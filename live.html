<!doctype html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Sims OS Live</title>
<style>
:root{--ink:#17233a;--muted:#6b7488;--glass:rgba(255,255,255,.88)}
*{box-sizing:border-box}body{margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:#8fc9ee;color:var(--ink)}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block}.hud{position:fixed;z-index:5;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:var(--glass);border:1px solid rgba(255,255,255,.72);box-shadow:0 18px 48px rgba(44,67,101,.18)}
.top{left:18px;right:18px;top:14px;height:68px;border-radius:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}.brand{display:flex;align-items:center;gap:12px}.gem{width:28px;height:28px;background:#49ce70;transform:rotate(45deg);border-radius:4px;box-shadow:0 10px 24px rgba(73,206,112,.42)}.brand small{display:block;color:var(--muted);font-weight:600}.live-badge{color:#128a42;font-weight:900}.clock{display:flex;gap:12px;align-items:center}.clock span{font-weight:900;padding:7px 10px;background:#edf3fb;border-radius:999px;font-size:12px}.zoom{display:flex;gap:8px}.zoom button,.controls button{border:0;border-radius:14px;background:#edf2fa;color:var(--ink);font-weight:900;cursor:pointer;padding:10px 13px}.controls button.active{background:#5a8df0;color:white}
.left,.right{top:100px;bottom:92px;border-radius:26px;padding:16px;overflow:auto}.left{left:18px;width:250px}.right{right:18px;width:320px}.agent-row{width:100%;border:1px solid transparent;background:#f4f7fc;border-radius:16px;padding:10px;margin:0 0 8px;display:flex;align-items:center;gap:10px;text-align:left;cursor:pointer}.agent-row.active,.agent-row:hover{background:#fff;border-color:#72a8ef}.avatar{font-size:26px}.agent-row small{display:block;color:var(--muted)}.profile{display:flex;gap:13px;align-items:center}.portrait{font-size:42px;width:72px;height:72px;border-radius:24px;background:#eef4fb;display:grid;place-items:center}.pill{display:inline-block;background:#eaf0fb;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.card{background:#f1f5fb;border-radius:16px;padding:12px;margin:8px 0 14px}.meters label{display:block;color:var(--muted);font-size:12px;margin:9px 0}.meters progress{width:100%;height:11px;accent-color:#63c876}
.bottom{left:50%;bottom:16px;transform:translateX(-50%);height:64px;border-radius:24px;width:min(760px,calc(100vw - 40px));display:flex;align-items:center;justify-content:space-between;padding:0 14px}.controls{display:flex;gap:8px}.hint{position:fixed;z-index:4;left:50%;bottom:94px;transform:translateX(-50%);background:rgba(31,47,75,.82);color:white;border-radius:999px;padding:8px 13px;font-size:12px}
@media(max-width:950px){.left,.right{display:none}.top{left:10px;right:10px}.brand small,.hint{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<header class="hud top"><div class="brand"><div class="gem"></div><div><strong>AI Sims OS</strong><small><span class="live-badge">STABLE CANVAS v1</span> · house + furniture + visible agents</small></div></div><div class="clock"><strong id="time">Dan 1 · 09:00</strong><span id="speedLabel">PLAY</span></div><div class="zoom"><button id="zoomOut">−</button><button id="zoomHome">⌂</button><button id="zoomIn">＋</button></div></header>
<aside class="hud left"><h2>AI tim</h2><div id="agentList"></div></aside>
<aside class="hud right"><div id="inspector"></div></aside>
<footer class="hud bottom"><div class="controls"><button id="pause">⏸</button><button id="play" class="active">▶</button><button id="fast">▶▶</button></div><div><b id="count">6</b> agenata · <b id="cost">€0.00</b></div><div>live stable preview</div></footer>
<div class="hint">Samostalni canvas: kuća i likovi bez vanjskih dependencyja</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let DPR=window.devicePixelRatio||1,W=0,H=0,zoom=1,panX=0,panY=0;
const rooms=[
{id:'ceo',name:'CEO Office',floor:1,col:0,span:1,color:'#f3c1d1',type:'office'},
{id:'research',name:'Research',floor:1,col:1,span:1,color:'#b9e3d0',type:'research'},
{id:'meeting',name:'Meeting',floor:1,col:2,span:2,color:'#e9dfbd',type:'meeting'},
{id:'lounge',name:'Lounge',floor:0,col:0,span:1,color:'#d7e7bc',type:'lounge'},
{id:'dev',name:'Development',floor:0,col:1,span:1,color:'#b8d8f5',type:'dev'},
{id:'studio',name:'Creative Studio',floor:0,col:2,span:1,color:'#f6d69b',type:'creative'},
{id:'qa',name:'QA Lab',floor:0,col:3,span:1,color:'#d2c5ee',type:'qa'}];
const agents=[
{id:'alpha',avatar:'🧠',name:'Alpha',role:'CEO agent',model:'Qwen 3',room:'ceo',u:.42,d:.58,tu:.42,td:.58,shirt:'#e86c91',hair:'#53372f',task:'Planira AI firmu',energy:88,focus:82,mood:86,say:'Provjeravam sprint.',face:1,wait:0,bubble:120},
{id:'nova',avatar:'👩‍💻',name:'Nova',role:'Developer',model:'DeepSeek Coder',room:'dev',u:.52,d:.60,tu:.52,td:.60,shirt:'#547de8',hair:'#352a28',task:'Gradi renderer',energy:73,focus:91,mood:75,say:'Buildam engine.',face:1,wait:0,bubble:120},
{id:'atlas',avatar:'🔎',name:'Atlas',role:'Researcher',model:'Llama 3.3',room:'research',u:.44,d:.56,tu:.44,td:.56,shirt:'#42a983',hair:'#68452f',task:'Istražuje workflow',energy:81,focus:87,mood:79,say:'Tražim bolji flow.',face:1,wait:0,bubble:120},
{id:'mira',avatar:'✍️',name:'Mira',role:'Creative agent',model:'Gemma 3',room:'studio',u:.50,d:.60,tu:.50,td:.60,shirt:'#e5a33d',hair:'#875339',task:'Radi vizuale',energy:77,focus:74,mood:92,say:'Dodajem toplinu.',face:1,wait:0,bubble:120},
{id:'pixel',avatar:'🧪',name:'Pixel',role:'QA agent',model:'Mistral',room:'qa',u:.46,d:.58,tu:.46,td:.58,shirt:'#8a68d8',hair:'#342c42',task:'Testira interakcije',energy:69,focus:89,mood:71,say:'Našao sam bug.',face:1,wait:0,bubble:120},
{id:'bolt',avatar:'⚙️',name:'Bolt',role:'Ops agent',model:'Qwen 3',room:'lounge',u:.48,d:.58,tu:.48,td:.58,shirt:'#67a64c',hair:'#493f31',task:'Prati deploy',energy:64,focus:68,mood:84,say:'Deploy je živ.',face:1,wait:0,bubble:120}];
let state={selected:'alpha',minute:9*60,day:1,speed:1,cost:0,last:performance.now()};
const layout={roomW:240,roomH:142,depth:74,floorGap:55,x0:-505,y0:-245};
function roomById(id){return rooms.find(r=>r.id===id)}
function agentById(id){return agents.find(a=>a.id===id)}
function clamp(n,a=0,b=100){return Math.max(a,Math.min(b,n))}
function lerp(a,b,t){return a+(b-a)*t}
function rr(r){let w=layout.roomW*r.span,x=layout.x0+r.col*layout.roomW,y=layout.y0+(1-r.floor)*(layout.roomH+layout.depth+layout.floorGap);return{x,y,w,h:layout.roomH,d:layout.depth}}
function worldPos(a){let r=rr(roomById(a.room));return{x:r.x+r.w*a.u+r.d*.45*a.d,y:r.y+r.h+r.d*a.d}}
function resize(){W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
window.addEventListener('resize',resize);resize();
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function poly(points,fill,stroke='#6f6259',lw=2){ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.lineWidth=lw;ctx.strokeStyle=stroke;ctx.stroke()}
function drawWindow(x,y,w=54,h=40){ctx.fillStyle='#cbe8ff';roundRect(x,y,w,h,8);ctx.fill();ctx.strokeStyle='#93b7cf';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w/2,y+h);ctx.moveTo(x,y+h/2);ctx.lineTo(x+w,y+h/2);ctx.stroke()}
function desk(x,y){ctx.fillStyle='#9d6e4a';roundRect(x,y,62,26,6);ctx.fill();ctx.fillStyle='#755136';ctx.fillRect(x+4,y+22,6,18);ctx.fillRect(x+52,y+22,6,18);ctx.fillStyle='#546a86';roundRect(x+18,y-18,26,18,3);ctx.fill();ctx.fillStyle='#c7ecff';ctx.fillRect(x+21,y-15,20,12)}
function chair(x,y,c='#596f8e'){ctx.fillStyle=c;roundRect(x,y,20,16,5);ctx.fill();ctx.fillRect(x+2,y+12,4,16);ctx.fillRect(x+14,y+12,4,16);ctx.fillRect(x+2,y-10,4,12);ctx.fillRect(x+14,y-10,4,12)}
function sofa(x,y){ctx.fillStyle='#8eb27a';roundRect(x,y,72,28,10);ctx.fill();roundRect(x,y-18,72,18,10);ctx.fill();roundRect(x-8,y-6,10,30,8);ctx.fill();roundRect(x+70,y-6,10,30,8);ctx.fill()}
function plant(x,y){ctx.fillStyle='#8e623f';roundRect(x+8,y+16,16,12,4);ctx.fill();ctx.fillStyle='#5ea157';ctx.beginPath();ctx.arc(x+14,y+8,10,0,7);ctx.arc(x+24,y+5,9,0,7);ctx.arc(x+19,y-5,10,0,7);ctx.fill()}
function board(x,y){ctx.fillStyle='#fafcff';roundRect(x,y,84,42,6);ctx.fill();ctx.strokeStyle='#8ea3b5';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#91b0c8';ctx.fillRect(x+10,y+10,24,4);ctx.fillRect(x+10,y+18,42,4);ctx.fillRect(x+10,y+26,30,4)}
function table(x,y){ctx.fillStyle='#a57854';roundRect(x,y,84,30,10);ctx.fill();ctx.fillStyle='#765136';ctx.fillRect(x+6,y+24,5,20);ctx.fillRect(x+73,y+24,5,20)}
function drawFurniture(room){let r=rr(room);if(room.type==='office'){desk(r.x+28,r.y+r.h+18);chair(r.x+34,r.y+r.h+48,'#a06a86');plant(r.x+r.w-52,r.y+r.h+20);board(r.x+r.w-104,r.y+22)}if(room.type==='research'){desk(r.x+26,r.y+r.h+16);chair(r.x+36,r.y+r.h+48,'#5f8f7b');plant(r.x+r.w-52,r.y+r.h+40);ctx.fillStyle='#adb7c4';ctx.beginPath();ctx.arc(r.x+r.w-62,r.y+r.h+26,14,0,7);ctx.fill()}if(room.type==='meeting'){table(r.x+r.w*.35,r.y+r.h+20);chair(r.x+r.w*.35-20,r.y+r.h+22,'#8e8c7a');chair(r.x+r.w*.35+88,r.y+r.h+22,'#8e8c7a');chair(r.x+r.w*.35+18,r.y+r.h+58,'#8e8c7a');chair(r.x+r.w*.35+52,r.y+r.h+58,'#8e8c7a');board(r.x+r.w-104,r.y+22)}if(room.type==='lounge'){sofa(r.x+34,r.y+r.h+24);plant(r.x+r.w-54,r.y+r.h+28);ctx.fillStyle='#c49a66';ctx.beginPath();ctx.ellipse(r.x+146,r.y+r.h+40,24,16,0,0,7);ctx.fill()}if(room.type==='dev'){desk(r.x+24,r.y+r.h+16);desk(r.x+112,r.y+r.h+42);chair(r.x+32,r.y+r.h+50,'#5b7cb4');chair(r.x+120,r.y+r.h+76,'#5b7cb4')}if(room.type==='creative'){desk(r.x+30,r.y+r.h+20);chair(r.x+40,r.y+r.h+54,'#c18a48');ctx.strokeStyle='#8f6d48';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(r.x+r.w-88,r.y+r.h+68);ctx.lineTo(r.x+r.w-67,r.y+r.h-4);ctx.lineTo(r.x+r.w-46,r.y+r.h+68);ctx.stroke();ctx.fillStyle='#ff8b6a';ctx.beginPath();ctx.arc(r.x+r.w-72,r.y+r.h+20,7,0,7);ctx.fill();ctx.fillStyle='#5bb0ff';ctx.beginPath();ctx.arc(r.x+r.w-58,r.y+r.h+32,7,0,7);ctx.fill()}if(room.type==='qa'){desk(r.x+26,r.y+r.h+18);chair(r.x+32,r.y+r.h+50,'#8061be');board(r.x+r.w-102,r.y+20);ctx.fillStyle='#67c06d';roundRect(r.x+r.w-74,r.y+r.h+34,28,28,8);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r.x+r.w-60,r.y+r.h+47,9,0,7);ctx.fill()}}
function drawRoom(room){let r=rr(room),d=r.d;ctx.fillStyle='#fffbf5';ctx.fillRect(r.x,r.y,r.w,r.h);ctx.fillStyle=room.color;ctx.globalAlpha=.56;ctx.fillRect(r.x+8,r.y+8,r.w-16,r.h-16);ctx.globalAlpha=1;poly([[r.x,r.y],[r.x+d*.45,r.y+d*.42],[r.x+d*.45,r.y+r.h+d*.42],[r.x,r.y+r.h]],'#e8dac9');poly([[r.x+r.w,r.y],[r.x+r.w+d*.45,r.y+d*.42],[r.x+r.w+d*.45,r.y+r.h+d*.42],[r.x+r.w,r.y+r.h]],'#d8cbbd');poly([[r.x,r.y+r.h],[r.x+r.w,r.y+r.h],[r.x+r.w+d*.45,r.y+r.h+d],[r.x+d*.45,r.y+r.h+d]],room.color);ctx.strokeStyle='rgba(111,98,89,.4)';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x,r.y+r.h);ctx.moveTo(r.x+r.w,r.y);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.moveTo(r.x,r.y+r.h);ctx.lineTo(r.x+r.w,r.y+r.h);ctx.stroke();drawWindow(r.x+18,r.y+18,58,40);if(r.w>300)drawWindow(r.x+r.w-82,r.y+18,58,40);ctx.font='700 14px Arial';ctx.fillStyle='#25344d';ctx.fillText(room.name,r.x+14,r.y+22);drawFurniture(room)}
function drawHouse(){ctx.fillStyle='#8fc9ee';ctx.fillRect(-4000,-3000,8000,6000);ctx.fillStyle='rgba(255,242,166,.85)';ctx.beginPath();ctx.arc(650,-360,68,0,7);ctx.fill();ctx.fillStyle='#7dc271';ctx.fillRect(-4000,360,8000,3000);ctx.fillStyle='rgba(93,150,83,.18)';ctx.beginPath();ctx.ellipse(40,385,880,74,0,0,7);ctx.fill();let x=layout.x0-50,y=layout.y0-108,w=layout.roomW*4+96,h=74;poly([[x,y+h],[x+w*.5,y],[x+w,y+h],[x+w*.5,y+h+34]],'#b35e4e','#7e4136');poly([[x,y+h],[x+w*.5,y+h+34],[x+w*.5,y+h+74],[x,y+h+40]],'#8d4f45','#6e3d35');poly([[x+w,y+h],[x+w*.5,y+h+34],[x+w*.5,y+h+74],[x+w,y+h+40]],'#a95a4e','#794339');ctx.fillStyle='#eedcc7';roundRect(layout.x0-34,layout.y0-22,layout.roomW*4+68,(layout.roomH+layout.depth)*2+layout.floorGap+28,12);ctx.fill();ctx.fillStyle='#d0b79c';ctx.fillRect(layout.x0-48,layout.y0-22+(layout.roomH+layout.depth)*2+layout.floorGap+20,layout.roomW*4+96,24);rooms.filter(r=>r.floor===1).forEach(drawRoom);ctx.fillStyle='#9d8876';ctx.fillRect(layout.x0-18,layout.y0+layout.roomH+layout.depth+22,layout.roomW*4+36,18);ctx.fillStyle='#75685e';ctx.fillRect(layout.x0-18,layout.y0+layout.roomH+layout.depth+38,layout.roomW*4+36,12);rooms.filter(r=>r.floor===0).forEach(drawRoom)}
function drawAgent(a,t){let p=worldPos(a),moving=Math.abs(a.tu-a.u)+Math.abs(a.td-a.d)>.02,sw=moving?Math.sin(t/120)*5:Math.sin(t/500)*1.5;ctx.save();ctx.translate(p.x,p.y);ctx.scale(a.face,1);ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.ellipse(0,7,20,7,0,0,7);ctx.fill();if(state.selected===a.id){ctx.fillStyle='#4ed16f';ctx.beginPath();ctx.moveTo(0,-78);ctx.lineTo(10,-58);ctx.lineTo(0,-38);ctx.lineTo(-10,-58);ctx.closePath();ctx.fill()}ctx.lineCap='round';ctx.strokeStyle='#25334d';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-6,-6);ctx.lineTo(-6+sw,15);ctx.moveTo(6,-6);ctx.lineTo(6-sw,15);ctx.stroke();ctx.strokeStyle='#f0bd8f';ctx.beginPath();ctx.moveTo(-11,-32);ctx.lineTo(-13-sw*.5,-11);ctx.moveTo(11,-32);ctx.lineTo(13+sw*.5,-11);ctx.stroke();ctx.fillStyle=a.shirt;roundRect(-13,-43,26,32,8);ctx.fill();ctx.fillStyle='#f0bd8f';ctx.beginPath();ctx.arc(0,-58,14,0,7);ctx.fill();ctx.fillStyle=a.hair;roundRect(-14,-72,28,14,7);ctx.fill();ctx.fillStyle='#2a3140';let ex=a.face<0?-3:3;ctx.beginPath();ctx.arc(ex-3,-58,1.5,0,7);ctx.arc(ex+3,-58,1.5,0,7);ctx.fill();ctx.strokeStyle='#784d44';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(-3,-50);ctx.quadraticCurveTo(0,-47,3,-50);ctx.stroke();ctx.restore();ctx.font='700 12px Arial';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='#1f2a3e';ctx.strokeText(a.name,p.x,p.y+28);ctx.fillStyle='#fff';ctx.fillText(a.name,p.x,p.y+28);if(a.bubble>0&&a.say){ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.96)';roundRect(p.x+18,p.y-105,132,36,12);ctx.fill();ctx.fillStyle='#17233a';ctx.font='11px Arial';wrap(a.say,p.x+26,p.y-82,115,13)}}
function wrap(text,x,y,max,line){let words=text.split(' '),s='';for(let w of words){let test=s+w+' ';if(ctx.measureText(test).width>max){ctx.fillText(s,x,y);s=w+' ';y+=line}else s=test}ctx.fillText(s,x,y)}
function update(dt){if(!state.speed)return;state.minute+=dt*.025*state.speed;if(state.minute>=1440){state.minute=7*60;state.day++}state.cost+=dt*.000002*state.speed;for(const a of agents){if(a.wait<=0){if(Math.random()>.86){let next=rooms[Math.floor(Math.random()*rooms.length)];a.room=next.id;a.say='Idem u '+next.name+'.';a.bubble=140}a.tu=.22+Math.random()*.56;a.td=.42+Math.random()*.34;a.wait=80+Math.random()*160}else a.wait-=dt*.06*state.speed;a.u=lerp(a.u,a.tu,.0016*dt*state.speed);a.d=lerp(a.d,a.td,.0016*dt*state.speed);if(Math.abs(a.tu-a.u)>.004)a.face=a.tu>a.u?1:-1;a.energy=clamp(a.energy-dt*.002*state.speed);a.focus=clamp(a.focus+(Math.random()-.5)*.18);a.mood=clamp(a.mood+(Math.random()-.5)*.12);if(a.bubble>0)a.bubble-=dt*.06;else if(Math.random()>.998){a.say=['Radim.','Treba review.','Sve ide dobro.','Imam ideju.'][Math.floor(Math.random()*4)];a.bubble=120}}}
function render(now){let dt=Math.min(50,now-state.last);state.last=now;update(dt);ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(W/2+panX,H/2+72+panY);ctx.scale(zoom,zoom);drawHouse();agents.slice().sort((a,b)=>worldPos(a).y-worldPos(b).y).forEach(a=>drawAgent(a,now));ctx.restore();renderUI();requestAnimationFrame(render)}
function renderUI(){let h=Math.floor(state.minute/60)%24,m=Math.floor(state.minute%60);time.textContent=`Dan ${state.day} · ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;speedLabel.textContent=state.speed===0?'PAUZA':state.speed===1?'PLAY':'FAST';count.textContent=agents.length;cost.textContent='€'+state.cost.toFixed(2);pause.classList.toggle('active',state.speed===0);play.classList.toggle('active',state.speed===1);fast.classList.toggle('active',state.speed===3);let a=agentById(state.selected),r=roomById(a.room);inspector.innerHTML=`<div class="profile"><div class="portrait">${a.avatar}</div><div><h2>${a.name}</h2><p>${a.role} · ${r.name}</p><span class="pill">${a.model}</span></div></div><section><h3>Trenutni zadatak</h3><div class="card">${a.task}</div></section><section class="meters"><h3>Potrebe</h3><label>⚡ Energija <progress value="${a.energy}" max="100"></progress></label><label>🎯 Fokus <progress value="${a.focus}" max="100"></progress></label><label>😊 Mood <progress value="${a.mood}" max="100"></progress></label></section><section><h3>Status</h3><div class="card">Stabilna canvas verzija: kuća, namještaj i likovi se crtaju u istom loopu.</div></section>`}
function renderList(){agentList.innerHTML='';agents.forEach(a=>{let b=document.createElement('button');b.className='agent-row '+(state.selected===a.id?'active':'');b.innerHTML=`<span class="avatar">${a.avatar}</span><span><b>${a.name}</b><small>${a.role}</small></span>`;b.onclick=()=>{state.selected=a.id;renderList()};agentList.appendChild(b)})}
pause.onclick=()=>state.speed=0;play.onclick=()=>state.speed=1;fast.onclick=()=>state.speed=3;zoomIn.onclick=()=>zoom=clamp(zoom+.08,.65,1.45);zoomOut.onclick=()=>zoom=clamp(zoom-.08,.65,1.45);zoomHome.onclick=()=>{zoom=1;panX=0;panY=0};
let dragging=false,sx=0,sy=0,px=0,py=0;canvas.addEventListener('pointerdown',e=>{dragging=true;sx=e.clientX;sy=e.clientY;px=panX;py=panY});addEventListener('pointermove',e=>{if(!dragging)return;panX=px+e.clientX-sx;panY=py+e.clientY-sy});addEventListener('pointerup',()=>dragging=false);canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=clamp(zoom-e.deltaY*.001,.65,1.45)},{passive:false});
renderList();requestAnimationFrame(render);
</script>
</body>
</html>
